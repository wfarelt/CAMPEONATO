{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesion</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Lexend", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-white">
    <div class="relative grid min-h-screen lg:grid-cols-2">
      <div
        class="hidden lg:flex items-center justify-center bg-gradient-to-br from-blue-700 via-blue-500 to-cyan-400 p-10"
      >
        <div class="w-full max-w-md rounded-3xl bg-black/25 p-10 backdrop-blur-sm">
          <img
            src="{% static 'tournament/cnf.png' %}"
            alt="CNF"
            class="mx-auto mb-8 h-40 w-40 rounded-2xl object-cover shadow-2xl"
          />
          <h1 class="text-center text-3xl font-black">Campeonato CNF</h1>
          <p class="mt-3 text-center text-sm text-white/90">
            Gestiona partidos, equipos, jornadas y posiciones desde el panel.
          </p>
        </div>
      </div>

      <div class="flex items-center justify-center p-6 sm:p-10">
        <div class="w-full max-w-md rounded-3xl border border-slate-800 bg-slate-900 p-8 shadow-xl">
          <div class="mb-6 text-center lg:hidden">
            <img
              src="{% static 'tournament/cnf.png' %}"
              alt="CNF"
              class="mx-auto mb-4 h-20 w-20 rounded-2xl object-cover"
            />
            <h1 class="text-xl font-bold">Campeonato CNF</h1>
          </div>

          <h2 class="mb-1 text-2xl font-extrabold">Iniciar sesion</h2>
          <p class="mb-6 text-sm text-slate-400">Ingresa con tu usuario del sistema</p>

          {% if form.errors %}
          <div class="mb-4 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-200">
            Usuario o contrasena incorrectos.
          </div>
          {% endif %}

          <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
              <label for="id_username" class="mb-1 block text-sm text-slate-300">Usuario</label>
              <input
                id="id_username"
                name="username"
                type="text"
                required
                autofocus
                class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-sm text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none"
                placeholder="Ej: admin"
              />
            </div>
            <div>
              <label for="id_password" class="mb-1 block text-sm text-slate-300">Contrasena</label>
              <input
                id="id_password"
                name="password"
                type="password"
                required
                class="w-full rounded-xl border border-slate-700 bg-slate-800 px-4 py-3 text-sm text-white placeholder-slate-500 focus:border-blue-500 focus:outline-none"
                placeholder="Tu contrasena"
              />
            </div>
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}" />
            {% endif %}
            <button
              type="submit"
              class="w-full rounded-xl bg-blue-600 px-4 py-3 text-sm font-bold text-white transition hover:bg-blue-500"
            >
              Entrar al dashboard
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
