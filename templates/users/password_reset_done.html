{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Correo enviado</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Lexend", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-white">
    <div class="flex min-h-screen items-center justify-center p-6 sm:p-10">
      <div class="w-full max-w-md rounded-3xl border border-slate-800 bg-slate-900 p-8 shadow-xl text-center">
        <img
          src="{% static 'tournament/cnf.png' %}"
          alt="CNF"
          class="mx-auto mb-6 h-20 w-20 rounded-2xl object-cover"
        />
        <div class="mb-4 flex justify-center">
          <div class="rounded-full bg-blue-500/20 p-4">
            <svg class="h-8 w-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
            </svg>
          </div>
        </div>
        <h2 class="mb-2 text-2xl font-extrabold">Revisa tu correo</h2>
        <p class="mb-6 text-sm text-slate-400">
          Si existe una cuenta con ese correo, recibirás un enlace para restablecer tu contraseña en los próximos minutos.
          Revisa también tu carpeta de spam.
        </p>
        <a
          href="{% url 'login' %}"
          class="inline-flex w-full items-center justify-center rounded-xl bg-blue-600 px-4 py-3 text-sm font-bold text-white transition hover:bg-blue-500"
        >
          Volver al login
        </a>
      </div>
    </div>
  </body>
</html>
